<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>紫煙観測所</title>
  <style>
    :root {
      --bg: #080607;
      --panel: rgba(20, 10, 14, 0.72);
      --red: #7d1024;
      --rose: #b71f3b;
      --text: #f8eef1;
      --muted: #caaab2;
      --line: rgba(255, 255, 255, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Times New Roman", "Hiragino Mincho ProN", "Yu Mincho", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 22%, rgba(125, 16, 36, 0.35), transparent 32%),
        radial-gradient(circle at 15% 80%, rgba(183, 31, 59, 0.18), transparent 30%),
        linear-gradient(160deg, #050404 0%, #12070a 48%, #050404 100%);
      overflow-x: hidden;
    }

    .smoke {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.42;
      background:
        radial-gradient(circle at 40% 70%, rgba(255,255,255,0.13), transparent 16%),
        radial-gradient(circle at 60% 42%, rgba(255,255,255,0.08), transparent 15%),
        radial-gradient(circle at 52% 22%, rgba(255,255,255,0.07), transparent 20%);
      filter: blur(24px);
      animation: drift 12s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translateY(18px) scale(1); }
      to { transform: translateY(-32px) scale(1.08); }
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .card {
      width: min(92vw, 520px);
      padding: 42px 26px 32px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: var(--panel);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .eyebrow {
      letter-spacing: 0.28em;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(32px, 8vw, 54px);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-shadow: 0 0 22px rgba(183, 31, 59, 0.28);
    }

    .count-wrap {
      margin: 26px auto 18px;
      padding: 22px 14px 18px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .label {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.16em;
      margin-bottom: 8px;
    }

    .count {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(86px, 24vw, 142px);
      line-height: 0.92;
      color: #fff7f8;
      text-shadow:
        0 0 18px rgba(183, 31, 59, 0.55),
        0 0 42px rgba(125, 16, 36, 0.58);
    }

    .unit {
      margin-left: 8px;
      font-size: clamp(24px, 7vw, 36px);
      color: var(--muted);
    }

    .message {
      min-height: 1.8em;
      margin: 18px 0 16px;
      font-size: 18px;
      line-height: 1.8;
      color: #f3dce2;
    }

    .updated {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    .reload {
      margin-top: 22px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 10px 18px;
      background: rgba(125,16,36,0.18);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.12em;
    }

    .reload:hover {
      background: rgba(183,31,59,0.25);
    }

    .rose {
      font-size: 32px;
      filter: drop-shadow(0 0 14px rgba(183,31,59,0.5));
    }

    .error {
      color: #ffd4dd;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <div class="smoke"></div>
  <main>
    <section class="card">
      <div class="rose">🥀</div>
      <div class="eyebrow">Smoke Observation</div>
      <h1 id="title">紫煙観測所</h1>

      <div class="count-wrap">
        <div class="label">現在の本数</div>
        <div><span class="count" id="count">--</span><span class="unit">本</span></div>
      </div>

      <div class="message" id="message">観測中……</div>
      <div class="updated" id="updated">Last update --</div>
      <button class="reload" onclick="loadData()">再観測</button>
      <p class="error" id="error"></p>
    </section>
  </main>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjPcQFt9EOQBDao2AgNSvQFdhtZ11bEWBG2Y0m9oegrh-SBzdrwokqgz3128YpXGG7yJq1dgF_7I5D/pub?output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (cell || row.length) {
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
          }
          if (char === "\r" && next === "\n") i++;
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    function pick(data, keys, fallbackIndex) {
      for (const key of keys) {
        if (data[key] !== undefined && data[key] !== "") return data[key];
      }
      return data.__row?.[fallbackIndex] || "";
    }

    async function loadData() {
      const errorEl = document.getElementById("error");
      errorEl.textContent = "";

      try {
        const response = await fetch(CSV_URL + "&cacheBust=" + Date.now());
        if (!response.ok) throw new Error("Google Sheetsを読み込めませんでした。");

        const text = await response.text();
        const rows = parseCSV(text).filter(r => r.some(c => c.trim() !== ""));
        if (rows.length < 2) throw new Error("スプレッドシートにデータ行がありません。");

        const headers = rows[0].map(h => h.trim().toLowerCase());
        const values = rows[1].map(v => v.trim());

        const data = { __row: values };
        headers.forEach((h, i) => data[h] = values[i]);

        const title = pick(data, ["title", "タイトル"], 0) || "紫煙観測所";
        const count = pick(data, ["count", "本数", "number"], 1) || "0";
        const message = pick(data, ["message", "一言", "コメント"], 2) || "静かな夜";
        const updated = pick(data, ["updated", "更新", "last update"], 3) || "";

        document.getElementById("title").textContent = title;
        document.getElementById("count").textContent = count;
        document.getElementById("message").textContent = message;
        document.getElementById("updated").textContent = updated ? "Last update " + updated : "Last update --";
      } catch (error) {
        errorEl.textContent = "読み込みに失敗しました。公開設定とシートの列名を確認してください。";
        console.error(error);
      }
    }

    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
